# HTTPS 正式配置（需已存在 /etc/letsencrypt/live/ageno.cn/ 证书）
# 80 跳转 HTTPS；443 SSL + 反代 Docker 内 Next（宿主机 3000）

server {
    listen 80;
    listen [::]:80;
    server_name ageno.cn www.ageno.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ageno.cn www.ageno.cn;

    ssl_certificate /etc/letsencrypt/live/ageno.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ageno.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
